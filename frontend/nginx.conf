server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    add_header X-Frame-Options "ALLOWALL" always;
    add_header Content-Security-Policy "frame-ancestors *" always;

    location = /teams-config {
        default_type text/html;
        return 200 '<!DOCTYPE html><html><head><meta charset="UTF-8"/><script src="https://unpkg.com/@microsoft/teams-js@1.11.0/dist/MicrosoftTeams.min.js"><\/script></head><body style="margin:0;display:flex;align-items:center;justify-content:center;height:100vh;background:#f3f2f1;font-family:sans-serif"><div style="background:white;border-radius:8px;padding:32px;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,.1)"><h2 style="color:#1a1a2e;margin-top:0">Zyra Call Dashboard</h2><p>Click <strong>Save</strong> to add this tab.</p></div><script>microsoftTeams.initialize();microsoftTeams.settings.registerOnSaveHandler(function(e){microsoftTeams.settings.setSettings({contentUrl:"https://gd-zyra-production-8f0a.up.railway.app",websiteUrl:"https://gd-zyra-production-8f0a.up.railway.app",suggestedDisplayName:"Zyra Dashboard"});e.notifySuccess();});microsoftTeams.settings.setValidState(true);<\/script></body></html>';
    }

    location /api/ {
        proxy_pass http://backend:8080/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 300s;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}