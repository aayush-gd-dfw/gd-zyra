server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Allow Teams to embed this app in an iframe
    add_header Content-Security-Policy "frame-ancestors 'self' https://teams.microsoft.com https://*.teams.microsoft.com https://*.skype.com https://*.office.com https://outlook.office365.com;" always;

    # Use Google DNS so proxy_pass doesn't crash nginx if 'backend' is unresolvable
    resolver 8.8.8.8 valid=30s ipv6=off;

    location /api/ {
        set $upstream http://backend:8080;
        proxy_pass $upstream/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 300s;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
