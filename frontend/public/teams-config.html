<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8"/>
  <script src="https://statics.teams.cdn.office.net/sdk/v1.11.0/js/MicrosoftTeams.min.js"></script>
  <style>
    body{margin:0;display:flex;align-items:center;justify-content:center;height:100vh;background:#f3f2f1;font-family:sans-serif;}
    .card{background:#fff;border-radius:8px;padding:32px;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,.1);}
    h2{margin-top:0;color:#1a1a2e;}
  </style>
</head>
<body>
  <div class="card">
    <h2>Zyra Call Dashboard</h2>
    <p>Click <strong>Save</strong> to add this tab to your channel.</p>
  </div>
  <script>
    microsoftTeams.initialize();
    microsoftTeams.settings.registerOnSaveHandler(function(saveEvent) {
      microsoftTeams.settings.setSettings({
        contentUrl: "https://gd-zyra-production-8f0a.up.railway.app",
        websiteUrl: "https://gd-zyra-production-8f0a.up.railway.app",
        suggestedDisplayName: "Zyra Dashboard"
      });
      saveEvent.notifySuccess();
    });
    microsoftTeams.settings.setValidState(true);
  </script>
</body>
</html>
