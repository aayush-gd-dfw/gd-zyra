<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Zyra Tab Config</title>
  <script src="https://res.cdn.office.net/teams-js/2.22.0/js/MicrosoftTeams.min.js"></script>
  <style>
    body { font-family: sans-serif; display:flex; align-items:center; justify-content:center; height:100vh; margin:0; background:#f3f2f1; }
    .card { background:white; border-radius:8px; padding:32px; text-align:center; box-shadow:0 2px 8px rgba(0,0,0,.1); }
    h2 { margin-top:0; color:#1a1a2e; }
  </style>
</head>
<body>
  <div class="card">
    <h2>Zyra Call Dashboard</h2>
    <p>Click <strong>Save</strong> to add this tab to your channel.</p>
  </div>
  <script>
    microsoftTeams.app.initialize().then(() => {
      microsoftTeams.pages.config.registerOnSaveHandler((saveEvent) => {
        microsoftTeams.pages.config.setConfig({
          contentUrl: "https://gd-zyra-production-8f0a.up.railway.app",
          websiteUrl: "https://gd-zyra-production-8f0a.up.railway.app",
          suggestedDisplayName: "Zyra Dashboard"
        });
        saveEvent.notifySuccess();
      });
      microsoftTeams.pages.config.setValidState(true);
    });
  </script>
</body>
</html>
